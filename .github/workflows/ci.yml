name: CI

on:
  workflow_call:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-lint:
    name: PHP Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Laravel Pint (read-only check)
        working-directory: api
        run: ./vendor/bin/pint --test

  frontend-lint:
    name: JS Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run Prettier (check mode)
        working-directory: frontend
        run: npm run format

  api-tests:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: taily
          MYSQL_USER: db
          MYSQL_PASSWORD: db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: taily
      DB_USERNAME: db
      DB_PASSWORD: db
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          extensions: pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        working-directory: api
        run: cp .env.example .env

      - name: Generate application key
        working-directory: api
        run: php artisan key:generate

      - name: Run database migrations
        working-directory: api
        run: php artisan migrate --force

      - name: Run tests
        working-directory: api
        run: php artisan test

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test

  distribution-smoke-test:
    name: Distribution Smoke Test (taily-app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout taily (package under test)
        uses: actions/checkout@v7
        with:
          path: taily

      - name: Checkout taily-app (distribution scaffold)
        uses: actions/checkout@v7
        with:
          repository: ulbrich-media/taily-app
          path: taily-app

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          extensions: pdo_sqlite, sqlite3

      # A real deploy already has .env pointing at a working database before
      # `composer install` runs, because taily-app's post-update-cmd hooks
      # (vendor:publish, migrate) fire mid-install and need one. Set that up
      # first so the hooks below succeed instead of hitting a database file
      # that doesn't exist yet.
      - name: Configure environment
        working-directory: taily-app
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          mkdir -p database
          touch database/database.sqlite

      # taily-app normally installs Taily from a tagged release. Point it at
      # this checkout instead so the CI run reflects the branch under test,
      # not the last published version — this is what catches package-
      # boundary bugs (missing publishes(), app_path()-dependent behavior)
      # before they ship.
      - name: Install this checkout of Taily into taily-app
        working-directory: taily-app
        run: |
          composer config repositories.under-test '{"type": "path", "url": "../taily", "options": {"symlink": false}}'
          composer require "ulbrich-media/taily:@dev" --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Generate application key
        working-directory: taily-app
        run: php artisan key:generate

      # post-update-cmd already published taily-assets; taily-config is only
      # wired to post-install-cmd, which `composer require` doesn't trigger.
      - name: Publish remaining package assets
        working-directory: taily-app
        run: php artisan vendor:publish --tag=taily-config --force

      - name: Render every transactional mail view
        working-directory: taily-app
        run: php artisan taily:smoke-test-mail

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
