name: Claude Implementation Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  implement:
    if: |
      startsWith(github.event.comment.body, '@claude implement') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    concurrency:
      group: claude-implement-${{ github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: taily
          MYSQL_USER: db
          MYSQL_PASSWORD: db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: taily
      DB_USERNAME: db
      DB_PASSWORD: db
    steps:
      # Resolves and validates the PR head in one call, then pins to that exact commit SHA
      # rather than a mutable branch name — this is a privileged job (contents: write,
      # id-token: write, the Claude secret) that's about to run composer install/npm ci/tests
      # against whatever it checks out, so re-resolving a branch *name* right before checkout
      # would leave a TOCTOU window (new commits could land on the branch between the
      # author-association check above and checkout) and would happily build/test the code of
      # *any* open PR a collaborator points it at. Pinning to the SHA closes the race; refusing
      # anything outside claude/implement/* branches or from a fork means this job only ever
      # executes code that originated from this automation's own build step in the first place.
      # (No separate check on the PR's own author: only OWNER/MEMBER/COLLABORATOR can trigger
      # this at all, and a collaborator naming their own branch claude/implement/* isn't a
      # privilege escalation — they already have contents: write and could push to development
      # directly.)
      - name: Resolve and validate PR head (iterate mode only)
        id: resolve
        if: github.event.issue.pull_request != null
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --json headRefName,headRefOid,isCrossRepository)
          HEAD_REF=$(echo "$PR_JSON" | jq -r .headRefName)
          HEAD_SHA=$(echo "$PR_JSON" | jq -r .headRefOid)
          IS_FORK=$(echo "$PR_JSON" | jq -r .isCrossRepository)

          if [ "$IS_FORK" = "true" ]; then
            echo "::error::Refusing to run — PR head is on a fork ($HEAD_REF)."
            exit 1
          fi
          case "$HEAD_REF" in
            claude/implement/*) ;;
            *)
              echo "::error::Refusing to iterate — '$HEAD_REF' wasn't created by /implement. Only branches under claude/implement/ are eligible for this privileged job."
              exit 1
              ;;
          esac

          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.issue.pull_request != null && steps.resolve.outputs.head_sha || 'development' }}
          fetch-depth: 0
          # No later step needs local git push/fetch credentials: Claude's own commits are
          # pushed via the action's own token exchange, and the lockfile-diff guards below use
          # `gh api compare` instead of raw git. The one exception is the recovery step further
          # down, which authenticates its own one-off push explicitly rather than relying on
          # anything persisted here.
          persist-credentials: false

      # Baseline to diff the working tree against later, regardless of mode — 'development' HEAD
      # for a build-mode run, the existing PR's head SHA for iterate mode. Needed because the
      # recovery step can't tell "Claude changed nothing" from "Claude changed things but nothing
      # ever got committed" without knowing where the tree started.
      - name: Capture starting SHA
        id: start_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # CI-parity setup, run as plain deterministic steps (not Claude tool calls) so Claude's
      # own in-turn checks run against an environment ci.yml will actually reproduce.
      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          extensions: pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env / generate key / migrate
        working-directory: api
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      # Agent mode (the explicit `prompt:` below) never runs the action's own branch-setup
      # logic — that only exists on the tag-mode code path. Instead it reads the branch name
      # straight from the CLAUDE_BRANCH env var and falls back to the checked-out ref
      # (development) if that's unset. Computing it ourselves, here, means every later step in
      # this workflow (PR creation, recovery, salvage) can rely on one known value instead of
      # trusting the action's own `branch_name` output — which, with CLAUDE_BRANCH unset, always
      # comes back empty and previously caused the PR-creation step to build a malformed compare
      # URL and PR head.
      - name: Determine Claude's working branch
        id: branch
        run: |
          if [ "${{ github.event.issue.pull_request != null }}" = "true" ]; then
            echo "name=${{ steps.resolve.outputs.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=claude/implement/issue-${{ github.event.issue.number }}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude implement
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_BRANCH: ${{ steps.branch.outputs.name }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          base_branch: development
          # Commits via GitHub's API instead of the git CLI — the only commit mechanism
          # available to Claude at all in agent mode. Without this, the file-ops MCP server
          # (commit_files/delete_files) never gets installed, Claude has no allowlisted raw
          # git commands either, and nothing it edits ever reaches GitHub, regardless of how
          # the run ends. See docs/ai-github-automation.md for how this was actually found.
          use_commit_signing: true
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE OR PR NUMBER: ${{ github.event.issue.number }}
            IS_PULL_REQUEST: ${{ github.event.issue.pull_request != null }}

            /implement
          claude_args: >
            --max-turns 500
            --model claude-sonnet-5
            --allowedTools "Read,Glob,Grep,Edit,Write,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files,Bash(gh api:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(api/vendor/bin/pint:*),Bash(php api/artisan test:*),Bash(npm run lint:*),Bash(npm run format:*),Bash(npm run test:*),Bash(npm run build:*)"
            --json-schema '{"type":"object","required":["mode","checks_passed"],"properties":{"mode":{"type":"string","enum":["build","iterate","blocked"]},"checks_passed":{"type":"boolean"},"checks_summary":{"type":"string"},"pr_title":{"type":"string"},"pr_body":{"type":"string"},"what_changed":{"type":"string"},"blocked_reason":{"type":"string"},"feedback_responses":{"type":"array","items":{"type":"object","required":["comment_type","action","reasoning"],"properties":{"comment_id":{"type":"integer"},"comment_type":{"type":"string","enum":["review_comment","general"]},"action":{"type":"string","enum":["implemented","declined","clarification_needed"]},"reasoning":{"type":"string"}}}}}}'

      # Everything below is deterministic (no LLM involved) — Claude never creates PRs,
      # comments, or toggles state itself. It only ever produces structured_output above.

      # commit_files (via use_commit_signing above) is Claude's real commit mechanism now, and
      # it pushes straight to GitHub's API in real time as Claude calls it — it doesn't touch
      # local git state at all, so `git status`/`git log` in this checkout stay unaware of it.
      # This step is a narrower safety net than it used to be: it only catches Edit/Write changes
      # still sitting in the working tree that were never wrapped in a commit_files call before
      # the run died (e.g. mid-edit when --max-turns hit). Only runs on failure — on success
      # SKILL.md instructs Claude to call commit_files as its last action, so anything still
      # dirty here on a successful run would be an already-known, documented gap, not silence.
      - name: Recover uncommitted or unpushed work
        id: recover
        if: always() && steps.claude.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          START_SHA: ${{ steps.start_sha.outputs.sha }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "claude[bot]"
            git config user.email "41898282+claude[bot]@users.noreply.github.com"
            git add -A
            git commit -m "wip: partial /implement changes (run did not finish)"
          fi

          if [ "$(git rev-parse HEAD)" = "$START_SHA" ]; then
            echo "No local changes beyond the starting point — nothing this step needs to recover."
            exit 0
          fi

          if git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:refs/heads/$BRANCH"; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Local commit exists but pushing to $BRANCH failed — this can happen if commit_files already pushed newer commits to that branch that this checkout never fetched. Check the branch directly before assuming work was lost."
          fi

      - name: Create PR (build mode)
        if: >
          github.event.issue.pull_request == null &&
          steps.claude.outputs.structured_output != '' &&
          fromJSON(steps.claude.outputs.structured_output).mode == 'build'
        env:
          GH_TOKEN: ${{ steps.claude.outputs.github_token }}
          PR_TITLE: ${{ fromJSON(steps.claude.outputs.structured_output).pr_title }}
          PR_BODY: ${{ fromJSON(steps.claude.outputs.structured_output).pr_body }}
          CHECKS_PASSED: ${{ fromJSON(steps.claude.outputs.structured_output).checks_passed }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          FLAG=""
          if [ "$CHECKS_PASSED" != "true" ]; then
            FLAG="--draft"
          fi

          CHANGED_FILES=$(gh api "repos/${{ github.repository }}/compare/development...$BRANCH" --jq '.files[].filename')
          if echo "$CHANGED_FILES" | grep -qE '^(composer\.(json|lock)|frontend/package(-lock)?\.json)$'; then
            FLAG="--draft"
            PR_BODY=$(printf '> [!WARNING]\n> Dependency files changed on this branch (composer.json/lock or package.json/lock). New packages require human consent per AGENTS.md — review before merging.\n\n%s' "$PR_BODY")
          fi

          gh pr create --repo ${{ github.repository }} --base development \
            --head "$BRANCH" --title "$PR_TITLE" --body "$PR_BODY" $FLAG

      - name: Post iterate summary + per-comment replies + toggle ready (iterate mode)
        if: >
          github.event.issue.pull_request != null &&
          steps.claude.outputs.structured_output != '' &&
          fromJSON(steps.claude.outputs.structured_output).mode == 'iterate'
        env:
          GH_TOKEN: ${{ steps.claude.outputs.github_token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          WHAT_CHANGED: ${{ fromJSON(steps.claude.outputs.structured_output).what_changed }}
          CHECKS_PASSED: ${{ fromJSON(steps.claude.outputs.structured_output).checks_passed }}
          STRUCTURED: ${{ steps.claude.outputs.structured_output }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          gh pr comment "$PR_NUMBER" --repo ${{ github.repository }} --body "$WHAT_CHANGED"

          # Reply individually to each inline review comment Claude evaluated — this is what
          # lets Claude push back on feedback it disagrees with, attached to the specific
          # comment thread, instead of only ever complying or staying silent. Failures are
          # collected (not swallowed) and posted as a fallback comment, since a silently lost
          # "declined" reply would defeat the whole point of this feature.
          FAILED_REPLIES=""
          while IFS= read -r item; do
            COMMENT_ID=$(echo "$item" | jq -r '.comment_id')
            ACTION=$(echo "$item" | jq -r '.action')
            REASONING=$(echo "$item" | jq -r '.reasoning')
            case "$ACTION" in
              implemented) LABEL="✅ Implemented" ;;
              declined) LABEL="❌ Declined" ;;
              clarification_needed) LABEL="❓ Needs clarification" ;;
              *) LABEL="$ACTION" ;;
            esac
            REPLY_BODY=$(printf '**%s** — %s' "$LABEL" "$REASONING")
            if ! gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments/$COMMENT_ID/replies" -f body="$REPLY_BODY"; then
              FAILED_REPLIES=$(printf '%s\n- Comment #%s (%s): %s' "$FAILED_REPLIES" "$COMMENT_ID" "$LABEL" "$REASONING")
            fi
          done < <(echo "$STRUCTURED" | jq -c '.feedback_responses // [] | .[] | select(.comment_type == "review_comment")')

          if [ -n "$FAILED_REPLIES" ]; then
            gh pr comment "$PR_NUMBER" --repo ${{ github.repository }} --body "$(printf '⚠️ Could not post individual replies to the following review comments — recording the verdicts here instead:%s' "$FAILED_REPLIES")"
          fi

          IS_DRAFT=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json isDraft -q .isDraft)

          LOCKFILES_CHANGED=false
          CHANGED_FILES=$(gh api "repos/${{ github.repository }}/compare/development...$HEAD_SHA" --jq '.files[].filename')
          if echo "$CHANGED_FILES" | grep -qE '^(composer\.(json|lock)|frontend/package(-lock)?\.json)$'; then
            LOCKFILES_CHANGED=true
          fi

          if [ "$CHECKS_PASSED" = "true" ] && [ "$IS_DRAFT" = "true" ] && [ "$LOCKFILES_CHANGED" = "false" ]; then
            gh pr ready "$PR_NUMBER" --repo ${{ github.repository }}
          fi

      - name: Post blocked explanation
        if: >
          steps.claude.outputs.structured_output != '' &&
          fromJSON(steps.claude.outputs.structured_output).mode == 'blocked'
        env:
          GH_TOKEN: ${{ steps.claude.outputs.github_token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REASON: ${{ fromJSON(steps.claude.outputs.structured_output).blocked_reason }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo ${{ github.repository }} --body "$REASON"

      # In build mode, if the recovery step above actually pushed something (whether that came
      # from an incomplete harness commit or purely from this workflow's own safety-net commit),
      # expose it as a draft PR instead of leaving it sitting on an unreferenced branch that
      # nobody would ever find. Iterate mode needs no equivalent step: recovery already pushed
      # straight onto the existing PR's own branch, so there's nothing further to expose.
      - name: Salvage recovered build-mode work as draft PR
        id: salvage
        if: >
          always() &&
          steps.claude.outcome == 'failure' &&
          github.event.issue.pull_request == null &&
          steps.recover.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.branch.outputs.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --repo ${{ github.repository }} --json title -q .title)
          gh pr create --repo ${{ github.repository }} --base development --head "$BRANCH" --draft \
            --title "chore: wip $ISSUE_TITLE (#$ISSUE_NUMBER)" \
            --body "$(printf '⚠️ Opened automatically — the `/implement` run for #%s failed or ran out of turns before finishing (see the [workflow run](%s)). Whatever partial progress existed is preserved here as a draft rather than discarded — note some of it may come from a safety-net commit this workflow made itself, not Claude, if the run stopped before its own commit landed. It may be incomplete or broken — review before relying on it. Comment `@claude implement` on this PR to continue the work.' "$ISSUE_NUMBER" "$RUN_URL")"
          echo "created=true" >> "$GITHUB_OUTPUT"

      # Fallback for everything the salvage step doesn't cover: iterate-mode failures, and
      # build-mode failures where the recovery step found nothing to push at all.
      - name: Post failure notice (nothing further to salvage)
        if: always() && steps.claude.outcome == 'failure' && steps.salvage.outputs.created != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RECOVERED: ${{ steps.recover.outputs.pushed }}
        run: |
          if [ "$RECOVERED" = "true" ]; then
            BODY="⚠️ \`/implement\` failed before finishing, but partial progress was pushed before the run ended — see the latest commit(s) and the [workflow run]($RUN_URL)."
          else
            BODY="⚠️ \`/implement\` failed before producing a result, and no changes were recovered. See the [workflow run]($RUN_URL) for details."
          fi
          gh issue comment "$ISSUE_NUMBER" --repo ${{ github.repository }} --body "$BODY"
