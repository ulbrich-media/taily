name: PR Quality Gates

on:
  pull_request:
    branches:
      - development

jobs:
  conventional-title:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    uses: ./.github/workflows/ci.yml
