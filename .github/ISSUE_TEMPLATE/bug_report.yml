name: Bug Report
description: Report a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What actually happens.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen instead.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps, as exact as possible.
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: input
    id: affected-area
    attributes:
      label: Affected area
      description: File, module, page, or component, if known.
      placeholder: e.g. src/auth/login.ts, or "login page"
    validations:
      required: false

  - type: textarea
    id: error-output
    attributes:
      label: Error messages / logs
      description: Paste exact error text, stack traces, or console output. Use code blocks.
      render: shell
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser/OS/version/branch — whatever's relevant to this repo.
    validations:
      required: false
