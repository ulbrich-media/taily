name: Feature Request
description: Propose a new feature or idea
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's missing, painful, or worth adding. Focus on the "why", not the "how".
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context / who's affected
      description: Who runs into this, how often, and how they currently work around it (if at all).
    validations:
      required: true

  - type: input
    id: affected-area
    attributes:
      label: Affected area
      description: File, module, or component this likely touches, if known.
    validations:
      required: false

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Anything the solution must respect — performance, compatibility, existing patterns, things to avoid.
    validations:
      required: false

  - type: textarea
    id: solution-idea
    attributes:
      label: Solution idea (optional)
      description: If you already have a direction in mind, sketch it here. Leave blank if you just want the plan skill to propose one.
    validations:
      required: false

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope (optional)
      description: Anything explicitly NOT wanted, if you already know.
    validations:
      required: false
