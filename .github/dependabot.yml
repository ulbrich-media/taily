version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    cooldown:
      semver-minor-days: 3
      semver-patch-days: 3
      semver-major-days: 14
    groups:
      frontend-minor:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      semver-minor-days: 3
      semver-patch-days: 3
      semver-major-days: 14
    groups:
      api-minor:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"
      include: "scope"
