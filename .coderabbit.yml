language: en

tone_instructions: "Focus on logic errors, security issues, and performance bottlenecks."

reviews:
  auto_review:
    enabled: false
  review_status: true
  instructions: |
    Apply the following project-specific coding patterns during review:

    **AlertDialog vs. Dialog vs. Page** (`docs/coding-patterns/alert-dialog-dialog-page.md`):
    - Use `AlertDialog` for confirmations of destructive or irreversible actions, with at most one small additional field (e.g. a reason text field, a date picker). Flag any `AlertDialog` that contains a form with multiple fields or complex content.
    - Use `Dialog` for short forms or compact content that fits on screen without scrolling. Flag any `Dialog` whose content is likely to require scrolling â€” it should be a page instead.
    - Use a full page for interactions where the content is too long to fit in a dialog without scrolling. Flag any page-level form that is trivially short and would be better served by a `Dialog`.

    **Token patterns** (`docs/coding-patterns/tokens.md`):
    - Use the `HasAccessToken` trait when a token gates access to an existing record (e.g. a temporary link to a pre-existing model). Tokens are stored in the shared `access_tokens` table.
    - Use a self-contained model with its own `token` and `expires_at` columns when the token record IS the business object (e.g. an invitation). There is no pre-existing record being gated.
    - Flag any new model that adds token-like columns directly when `HasAccessToken` would be more appropriate, and vice versa.

    **Frontend links via callback** (`docs/coding-patterns/frontend-links.md`):
    - All backend-generated frontend URLs must go through `FrontendUriBuilder`. Flag any inline construction of callback URLs using `env('FRONTEND_URL')` or string concatenation.
    - Each new action requires a static method on `FrontendUriBuilder` and a corresponding handler in the frontend `/callback` route.

    **Public API spec** (`api/public/openapi.yaml`):
    - `api/public/openapi.yaml` is a hand-maintained OpenAPI 3.0 spec â€” there is no auto-generation. Flag any PR that modifies `api/routes/api.php`, `api/src/Http/Controllers/Api/`, or `api/src/Http/Resources/Api/` without a corresponding update to `api/public/openapi.yaml`.

    **API type handling** (`docs/coding-patterns/api-type-handling.md`):
    - Every model returned from an endpoint must be wrapped in a Laravel Resource â€” never a raw Eloquent model. Flag any controller method that returns a raw model or `$model->toArray()` instead of a Resource.
    - Nested relations inside a Resource must themselves be wrapped in the appropriate Resource class. Flag any `$this->whenLoaded('relation')` that returns a raw model instead of e.g. `new PersonBaseResource($v)` or `ResourceClass::collection(...)`.
    - Frontend types for API responses must live in `frontend/src/api/types/*.ts`. Flag any resource-shaped interface defined inside a module's own `api/types.ts` instead of the central location.
    - Each frontend resource interface must mirror the corresponding backend Resource exactly. Flag interfaces that add `?` (optional/undefined) to fields that are always present in the resource; nullable fields must be `Type | null`, not `Type?` or `Type | undefined`.

    **Empty strings** (`docs/coding-patterns/empty-strings.md`):
    - String/text columns must be non-nullable by default. Flag any migration that adds `->nullable()` to a string column unless there is a clear semantic reason for `null` to be distinct from empty.
    - Empty-string defaults must be set in the model via `protected $attributes`, not via `->default('')` in the migration.
    - Flag any seeder or factory that sets a string field to `null` where the column is non-nullable.

    **File storage** (`docs/coding-patterns/file-storage.md`):
    - Every model that stores media must use a dedicated disk in `registerMediaCollections()`. Flag any `useDisk('local')` or `useDisk('public')` on a model-specific collection â€” each file type needs its own named disk.
    - Flag any new disk in `filesystems.php` whose `root` path is nested inside another disk's root.

    **Media URLs** (`docs/coding-patterns/media-urls.md`):
    - Private/internal media must be served via signed temporary URLs through `MediaController` (`media.serve` route). Flag any new internal media-serving route that does not call `$request->hasValidSignature()`.
    - Public media must be served via direct UUID access through `PublicMediaController` with a `do_publish`-style model-level gate. Flag any public media endpoint that skips the model-level authorization check.
  path_filters:
    - "!**/vendor/**"
    - "!**/node_modules/**"
    - "!**/package-lock.json"
    - "!**/composer.lock"
    - "!frontend/src/routeTree.gen.ts"
    - "!**/*.min.js"
    - "!**/dist/**"
    - "!**/build/**"

issue_enrichment:
  planning:
    enabled: true
